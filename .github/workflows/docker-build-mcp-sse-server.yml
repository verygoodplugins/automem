# Docker Build for MCP SSE Server - Validate and publish image to GitHub Container Registry
#
# This workflow validates the mcp-sse-server Docker image for PRs/main changes and
# publishes a container image for main pushes, version tags, and manual dispatches.
#
# Required secrets:
# - GITHUB_TOKEN (auto-provided): Used to authenticate with GHCR

name: Docker Build (MCP SSE Server)

on:
    push:
        branches: [main]
        tags: ["v*"]
        paths:
            - "mcp-sse-server/**"
            - ".github/workflows/docker-build-mcp-sse-server.yml"
    pull_request:
        branches: [main]
        paths:
            - "mcp-sse-server/**"
            - ".github/workflows/docker-build-mcp-sse-server.yml"
    workflow_dispatch:
        inputs:
            tag:
                description: "Custom tag for the image (optional)"
                required: false
                default: ""

concurrency:
    group: docker-build-mcp-sse-server-${{ github.ref }}
    cancel-in-progress: true

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}/mcp-sse-server

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=ref,event=branch
                      type=ref,event=pr
                      type=sha,prefix=sha-,suffix=,format=short
                      type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

            - name: Build Docker image
              uses: docker/build-push-action@v6
              with:
                  context: ./mcp-sse-server
                  push: false
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  platforms: linux/amd64

    publish:
        runs-on: ubuntu-latest
        needs: build
        if: github.event_name != 'pull_request'
        permissions:
            contents: read
            packages: write
            attestations: write
            id-token: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=ref,event=branch
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=semver,pattern={{major}}
                      type=sha,prefix=sha-,suffix=,format=short
                      type=raw,value=latest,enable={{is_default_branch}}
                      type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

            - name: Build and push Docker image
              id: push
              uses: docker/build-push-action@v6
              with:
                  context: ./mcp-sse-server
                  push: true
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  platforms: ${{ (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}

            - name: Generate artifact attestation
              uses: actions/attest-build-provenance@v2
              with:
                  subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  subject-digest: ${{ steps.push.outputs.digest }}
                  push-to-registry: true

            - name: Print image digest
              run: |
                  echo "MCP SSE Server image pushed successfully!"
                  echo "Digest: ${{ steps.push.outputs.digest }}"
                  echo "Tags:"
                  echo "${{ steps.meta.outputs.tags }}"
