# Docker Build for MCP AutoMem - Build and push image to GitHub Container Registry
#
# This workflow validates Docker builds for container-related changes and
# publishes release/manual images to GitHub Container Registry (ghcr.io).
#
# Required secrets:
# - GITHUB_TOKEN (auto-provided): Used to authenticate with GHCR

name: Docker Build (MCP AutoMem)

on:
    push:
        branches: [main]
        tags: ["v*"]
        paths:
            - "mcp-sse-server/Dockerfile"
            - "mcp-sse-server/package.json"
            - "mcp-sse-server/package-lock.json"
            - ".github/workflows/docker-build-mcp-automem.yml"
    pull_request:
        branches: [main]
        paths:
            - "mcp-sse-server/Dockerfile"
            - "mcp-sse-server/package.json"
            - "mcp-sse-server/package-lock.json"
            - ".github/workflows/docker-build-mcp-automem.yml"
    workflow_dispatch:
        inputs:
            tag:
                description: "Custom tag for the image (optional)"
                required: false
                default: ""

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository_owner }}/mcp-automem

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
            attestations: write
            id-token: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Container Registry
              if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: |
                      ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                      ${{ env.REGISTRY }}/${{ github.repository }}/mcp-sse-server
                  tags: |
                      type=ref,event=branch
                      type=ref,event=pr
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=semver,pattern={{major}}
                      type=sha,prefix=sha-,suffix=,format=short
                      type=raw,value=latest,enable={{is_default_branch}}
                      type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
                      type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

            - name: Build and optionally push Docker image
              id: push
              uses: docker/build-push-action@v6
              with:
                  context: ./mcp-sse-server
                  push: ${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max
                  platforms: ${{ (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch') && 'linux/amd64,linux/arm64' || 'linux/amd64' }}

            - name: Generate artifact attestation
              if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
              uses: actions/attest-build-provenance@v2
              with:
                  subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  subject-digest: ${{ steps.push.outputs.digest }}
                  push-to-registry: true

            - name: Print image digest
              if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
              run: |
                  echo "MCP AutoMem image pushed successfully!"
                  echo "Digest: ${{ steps.push.outputs.digest }}"
                  echo "Tags:"
                  echo "${{ steps.meta.outputs.tags }}"
